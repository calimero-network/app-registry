openapi: 3.0.0
info:
  title: Calimero Registry V2 API
  description: V2 Bundle API for Calimero Registry (MPK format)
  version: 2.0.0
servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://registry.calimero.network
    description: Production server
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v2/bundles:
    get:
      summary: List all bundles
      parameters:
        - name: package
          in: query
          schema:
            type: string
          description: Filter by package name
        - name: version
          in: query
          schema:
            type: string
          description: Filter by version (requires package)
        - name: developer
          in: query
          schema:
            type: string
          description: Filter by developer pubkey
      responses:
        '200':
          description: List of bundles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BundleManifest'
    post:
      summary: Push a new bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BundleManifest'
      responses:
        '201':
          description: Bundle created successfully
        '400':
          description: Invalid bundle manifest
        '403':
          description: Not the package owner (only signer or a key in manifest.owners can push)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: not_owner
                  message:
                    type: string
        '409':
          description: Bundle already exists
  /api/v2/bundles/{package}/{version}:
    get:
      summary: Get specific bundle
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bundle manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleManifest'
        '404':
          description: Bundle not found
  /artifacts/{path}:
    get:
      summary: Serve bundle artifacts (MPK, WASM)
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Artifact path (e.g., package/version/file.mpk)
      responses:
        '200':
          description: Artifact file
        '404':
          description: Artifact not found
components:
  schemas:
    BundleManifest:
      type: object
      required:
        - version
        - package
        - appVersion
        - metadata
        - wasm
      properties:
        version:
          type: string
          description: Manifest version (always "1.0" for v2)
        package:
          type: string
          description: Package identifier (e.g., com.calimero.myapp)
        appVersion:
          type: string
          description: Application version (semver)
        metadata:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            author:
              type: string
        wasm:
          description: The main application WASM artifact (packed as app.wasm).
          $ref: '#/components/schemas/BundleArtifact'
        abi:
          description: The main application ABI artifact (packed as abi.json), if any.
          $ref: '#/components/schemas/BundleArtifact'
        services:
          type: array
          description: >-
            Additional named services shipped alongside the main app (e.g. a
            "lobby" service next to a "tictactoe" main app). Optional and
            omitted entirely for single-app bundles, so existing manifests and
            their signatures are unaffected.
          items:
            $ref: '#/components/schemas/BundleServiceEntry'
        links:
          type: object
          properties:
            frontend:
              type: string
            github:
              type: string
            docs:
              type: string
        signature:
          type: object
          properties:
            alg:
              type: string
            sig:
              type: string
            pubkey:
              type: string
            signedAt:
              type: string
    BundleArtifact:
      type: object
      description: A file packed in the bundle, referenced by its in-bundle path.
      properties:
        path:
          type: string
          description: Path of the file within the bundle (e.g. app.wasm, services/lobby.wasm).
        hash:
          type: string
          nullable: true
          description: SHA-256 hex digest of the file contents.
        size:
          type: integer
          description: File size in bytes.
    BundleServiceEntry:
      type: object
      required:
        - name
        - wasm
      description: A named service shipped alongside the main application.
      properties:
        name:
          type: string
          description: Service name; also its file stem under services/.
        wasm:
          $ref: '#/components/schemas/BundleArtifact'
        abi:
          $ref: '#/components/schemas/BundleArtifact'
